name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: bash scripts/package.sh

      - name: Create zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent CursorBar.app "CursorBar-${VERSION}.zip"
          shasum -a 256 "CursorBar-${VERSION}.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: CursorBar-*.zip
          generate_release_notes: true
